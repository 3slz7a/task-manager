<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <h1>Taskify</h1>

  <div class="account">
    <button class="account-btn">👤</button>

    <!-- 🔥 DROPDOWN -->
    <div class="dropdown">

      <!-- upload -->
      <a href="#" onclick="document.getElementById('uploadImage').click()">
        📷 Upload Image
      </a>

      <!-- about -->
      <a href="about.html">About</a>

      <!-- history -->
      <a href="history.html">History</a>

      <!-- logout -->
      <a href="login.html" onclick="logout()">Logout</a>

    </div>
  </div>
</div>

<!-- 🔥 hidden upload input -->
<input type="file" id="uploadImage" hidden>

<!-- ================= FORM ================= -->
<form id="taskForm">
  <input type="text" id="title" placeholder="Task Title" required>
  <input type="datetime-local" id="dueDate" required>

  <select id="priority">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>

  <button type="submit">Add Task</button>
</form>

<!-- ================= BOARD ================= -->
<div class="board">

  <div class="column" id="todo">
    <h2>To Do</h2>
  </div>

  <div class="column" id="inProgress">
    <h2>In Progress</h2>
  </div>

  <div class="column" id="done">
    <h2>Done</h2>
  </div>

</div>

<!-- ================= DELETE MODAL ================= -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>🗑 Delete Task</h3>
    <p>Are you sure?</p>

    <button id="confirmDelete" class="btn-danger">Yes, Delete</button>
    <button id="cancelDelete" class="btn-cancel">Cancel</button>
  </div>
</div>

<!-- ================= TICKER ================= -->
<div class="ticker">
  <div id="tickerTrack" class="ticker-track"></div>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="js/app.js"></script>

<script>
function logout() {
  localStorage.removeItem("user");
}
</script>


</body>
</html>
